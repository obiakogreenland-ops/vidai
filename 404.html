<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found</title>

  <style>
    body {
      background: #060610;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    .box {
      max-width: 500px;
      padding: 40px;
    }

    h1 {
      font-size: 72px;
      margin-bottom: 10px;
      color: #00D2FF;
    }

    p {
      color: #A0A0C0;
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      padding: 12px 24px;
      background: #00D2FF;
      color: #060610;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    a:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>The page you’re looking for does not exist.</p>
    <a href="/">Go Home</a>
  </div>
</body>
</html>
