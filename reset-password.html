<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — VidAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#060610;--a:#00D2FF;--ag:rgba(0,210,255,.22);--err:#EF4444;--ok:#22C55E;--sans:'Plus Jakarta Sans',sans-serif}
body{min-height:100vh;background:var(--ink);color:#EEEEFF;font-family:var(--sans);display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(0,210,255,.07),transparent 60%),var(--ink)}
.card{width:min(420px,100%);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;overflow:hidden;box-shadow:0 32px 64px rgba(0,0,0,.6)}
.card-top{padding:32px 32px 24px;border-bottom:1px solid rgba(255,255,255,.07);text-align:center}
.logo{font-size:32px;margin-bottom:12px}
.title{font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px}
.subtitle{font-size:13px;color:rgba(160,160,192,.6);font-style:italic}
.card-body{padding:28px 32px 32px;display:flex;flex-direction:column;gap:16px}
label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(160,160,192,.5);margin-bottom:6px}
input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;color:#EEEEFF;font-family:var(--sans);font-size:14px;outline:none;transition:border-color .2s}
input:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(0,210,255,.08)}
.btn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--a);color:var(--ink);font-family:var(--sans);font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:0 6px 20px var(--ag)}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.msg{font-size:12px;text-align:center;padding:10px 14px;border-radius:8px;min-height:20px}
.msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--err)}
.msg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--ok)}
.back{text-align:center;font-size:12px;color:rgba(160,160,192,.4)}
.back a{color:var(--a);text-decoration:none}
.back a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="logo">🎬</div>
    <div class="title">Reset your password</div>
    <div class="subtitle">Enter a new password for your VidAI account</div>
  </div>
  <div class="card-body" id="form-wrap">
    <div>
      <label for="pw">New Password</label>
      <input type="password" id="pw" placeholder="8+ characters" autocomplete="new-password"/>
    </div>
    <div>
      <label for="pw2">Confirm Password</label>
      <input type="password" id="pw2" placeholder="Same password again" autocomplete="new-password"/>
    </div>
    <div class="msg" id="msg" style="display:none"></div>
    <button class="btn" id="btn" onclick="doReset()">Set new password →</button>
    <div class="back"><a href="index.html">← Back to VidAI</a></div>
  </div>
</div>

<script>
// ── CONFIG — update to match your backend URL ──────────────────────────────
const API_BASE = 'https://your-backend.up.railway.app';

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

async function doReset() {
  const token = new URLSearchParams(location.search).get('token');
  const pw    = document.getElementById('pw').value;
  const pw2   = document.getElementById('pw2').value;
  const btn   = document.getElementById('btn');

  if (!token) { showMsg('Invalid or missing reset token. Request a new link.', 'err'); return; }
  if (!pw)    { showMsg('Please enter a new password.', 'err'); return; }
  if (pw.length < 8) { showMsg('Password must be at least 8 characters.', 'err'); return; }
  if (pw !== pw2) { showMsg('Passwords do not match.', 'err'); return; }

  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    const r = await fetch(API_BASE + '/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pw }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.message || 'Reset failed.');
    showMsg('Password updated! Redirecting to sign in…', 'ok');
    setTimeout(() => { location.href = 'video-workshop-app.html'; }, 2000);
  } catch (e) {
    showMsg(e.message, 'err');
    btn.disabled = false; btn.textContent = 'Set new password →';
  }
}

document.getElementById('pw2').addEventListener('keydown', e => {
  if (e.key === 'Enter') doReset();
});

// Validate token presence on load
if (!new URLSearchParams(location.search).get('token')) {
  showMsg('No reset token found. Please use the link from your email.', 'err');
  document.getElementById('btn').disabled = true;
}
</script>
</body>
</html>
